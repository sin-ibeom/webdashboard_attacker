<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 - SIB</title>
  <script type="module" crossorigin src="{{ url_for('static', filename='assets/indexjs.js') }}"></script>
  <link rel="stylesheet" crossorigin href="{{ url_for('static', filename='assets/indexcss.css') }}">
  <!-- 여긴 제미나이 -->

  <script>
    window.addEventListener('DOMContentLoaded', function(){
  //     document.querySelector("html").addEventListener("keydown", function (e){
  //       if(e.key == "F12"){
  //         e.preventDefault();
  //         alert("오류를 방지를 위해 개발자 콘솔을 막아놨습니다")
  //       }
  //     })
  //
  // document.querySelector("html").addEventListener("contextmenu", function (e){
  //       e.preventDefault();
  //     })

      var input = document.querySelector(".id");

      input.addEventListener("keydown", function(evt){
        if(evt.key === 'Tab'){
          evt.preventDefault();
          document.querySelector(".pw").focus();
        }
      });
    });
</script>
  <!--      ㅡㅡㅡㅡㅡㅡ      -->
</head>
<body class="bg-slate-50 h-screen flex items-center justify-center p-4">

<div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-2xl border border-slate-100">

  <div class="text-center mb-10">
    <div class="inline-block p-4 bg-blue-50 rounded-2xl mb-4">
      <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
      </svg>
    </div>
    <h1 class="text-3xl font-bold text-slate-800">SIB</h1>
    <p class="text-slate-500 mt-2">로그인하여 서비스를 이용해 보세요</p>
  </div>

  <form action="/login" class="space-y-6" method="post">
    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-2">아이디</label>
      <input
              type="text"
              placeholder="admin"
              name="id"
              class="id w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
      />
    </div>

    <div>
      <div class="flex justify-between mb-2">
        <label class="block text-sm font-semibold text-slate-700">비밀번호</label>
        <a href="https://discord.com/users/1199560123228631130" class="text-sm text-blue-600 hover:underline">비밀번호 찾기</a>
      </div>
      <input
              type="password"
              placeholder="••••••••"
              name="pw"
              class="pw w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
      />
    </div>
    <p class="" style="color : #ff0000; font-size : 0.8rem">{{info["fail"]}}</p>

    <button
            type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-200 transition transform active:scale-95"
    >
      로그인
    </button>
  </form>

  <div class="mt-8 text-center text-sm text-slate-500">
    tailwindcss v4.3 사용
  </div>
</div>
</body>
</html>
